<div>
    <input type="text" id="key" value="" style="height: 19px;"/>
    <input type="button" value="搜索" onclick="search()" title="点击一下，立即搜索"/>

<script>
let url = 'https://www.google.com/search?q=site:www.nosuchfield.com';

function search() {
    let value = document.getElementById('key').value;
    window.location.href = url + ' ' + value;
}

document.getElementById('key').onkeypress = function(e) {
    if (!e) e = window.event;
    let keyCode = e.keyCode || e.which;
    if (keyCode == '13') {
        search();
    }
}
</script>
