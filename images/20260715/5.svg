<svg xmlns="http://www.w3.org/2000/svg" width="680" height="480" viewBox="0 0 680 480"><rect x="0" y="0" width="680" height="480" fill="#ffffff"/><defs><marker id="aG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker><marker id="aT" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker><marker id="aP" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><style>text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",sans-serif}.t{font-size:14px;fill:#3d3d3a}.ts{font-size:12px;fill:#73726c}.th{font-size:14px;font-weight:600;fill:#3d3d3a}</style><rect x="60" y="40" width="160" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/><text x="140.0" y="63.0" font-size="14" text-anchor="middle" fill="#712B13" font-weight="600">客户端</text><text x="140.0" y="83.0" font-size="12" text-anchor="middle" fill="#993C1D">应用 + GFS 客户端库</text><rect x="420" y="40" width="200" height="76" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/><text x="520" y="63" font-size="14" text-anchor="middle" fill="#3C3489" font-weight="600">Master</text><text x="520" y="83" font-size="12" text-anchor="middle" fill="#534AB7">命名空间、chunk → 机器</text><text x="520" y="103" font-size="12" text-anchor="middle" fill="#534AB7">租约与副本调度</text><text x="318" y="52" font-size="12" text-anchor="middle">① 问:该 chunk 在哪</text><line x1="224" y1="64" x2="416" y2="64" stroke="#73726c" stroke-width="1.2"  marker-end="url(#aG)"/><line x1="416" y1="88" x2="224" y2="88" stroke="#73726c" stroke-width="1.2"  marker-end="url(#aG)"/><text x="318" y="110" font-size="12" text-anchor="middle">② 返回三副本位置 + 谁是 primary</text><line x1="110" y1="96" x2="128" y2="314" stroke="#1D9E75" stroke-width="1.5"  marker-end="url(#aT)"/><text x="145" y="204" font-size="12">③ 数据推流</text><line x1="200" y1="96" x2="318" y2="314" stroke="#7F77DD" stroke-width="1.5"  marker-end="url(#aP)"/><text x="272" y="192" font-size="12">④ 写指令给 primary</text><line x1="535" y1="116" x2="535" y2="314" stroke="#9c9a92" stroke-width="0.9" stroke-dasharray="4 3"/><text x="550" y="214" font-size="12">心跳 / 租约续期</text><rect x="60" y="320" width="170" height="64" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/><text x="145.0" y="347.0" font-size="14" text-anchor="middle" fill="#444441" font-weight="600">Chunkserver A</text><text x="145.0" y="367.0" font-size="12" text-anchor="middle" fill="#5F5E5A">secondary 副本</text><rect x="255" y="320" width="170" height="64" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/><text x="340.0" y="347.0" font-size="14" text-anchor="middle" fill="#085041" font-weight="600">Chunkserver B</text><text x="340.0" y="367.0" font-size="12" text-anchor="middle" fill="#0F6E56">primary(持有租约)</text><rect x="450" y="320" width="170" height="64" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/><text x="535.0" y="347.0" font-size="14" text-anchor="middle" fill="#444441" font-weight="600">Chunkserver C</text><text x="535.0" y="367.0" font-size="12" text-anchor="middle" fill="#5F5E5A">secondary 副本</text><line x1="233" y1="340" x2="250" y2="340" stroke="#1D9E75" stroke-width="1.5"  marker-end="url(#aT)"/><line x1="428" y1="340" x2="445" y2="340" stroke="#1D9E75" stroke-width="1.5"  marker-end="url(#aT)"/><line x1="250" y1="368" x2="233" y2="368" stroke="#7F77DD" stroke-width="1.5"  marker-end="url(#aP)"/><line x1="428" y1="368" x2="445" y2="368" stroke="#7F77DD" stroke-width="1.5"  marker-end="url(#aP)"/><text x="340" y="408" font-size="12" text-anchor="middle">⑤ primary 定序后下发写命令,全部确认才应答客户端</text><text x="340" y="442" font-size="12" text-anchor="middle">绿色 = 数据流:就近链式接力,吃满每台机器的网卡带宽</text><text x="340" y="462" font-size="12" text-anchor="middle">紫色 = 控制流:只传指令不传数据;虚线心跳连所有 Chunkserver</text></svg>