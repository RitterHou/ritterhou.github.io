<svg xmlns="http://www.w3.org/2000/svg" width="680" height="870" viewBox="0 0 680 870"><rect x="0" y="0" width="680" height="870" fill="#ffffff"/><defs><marker id="aG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker><marker id="aT" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker><marker id="aP" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><style>text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",sans-serif}.t{font-size:14px;fill:#3d3d3a}.ts{font-size:12px;fill:#73726c}.th{font-size:14px;font-weight:600;fill:#3d3d3a}</style><rect x="260" y="20" width="160" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/><text x="340.0" y="47.0" font-size="14" text-anchor="middle" fill="#444441" font-weight="600">终端用户</text><line x1="340" y1="64" x2="340" y2="96" stroke="#73726c" stroke-width="1.2"  marker-end="url(#aG)"/><rect x="60" y="100" width="560" height="210" rx="16" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/><text x="80" y="129" font-size="14" fill="#712B13" font-weight="600">CDN 层 — 解决距离与延迟</text><rect x="90" y="140" width="250" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/><text x="215.0" y="163.0" font-size="14" text-anchor="middle" fill="#633806" font-weight="600">智能调度</text><text x="215.0" y="183.0" font-size="12" text-anchor="middle" fill="#854F0B">DNS / Anycast 就近接入</text><rect x="360" y="140" width="230" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/><text x="475.0" y="163.0" font-size="14" text-anchor="middle" fill="#633806" font-weight="600">边缘节点 PoP</text><text x="475.0" y="183.0" font-size="12" text-anchor="middle" fill="#854F0B">内存 + SSD 缓存热内容</text><rect x="90" y="216" width="250" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/><text x="215.0" y="239.0" font-size="14" text-anchor="middle" fill="#633806" font-weight="600">中间层缓存 L2</text><text x="215.0" y="259.0" font-size="12" text-anchor="middle" fill="#854F0B">汇聚回源,保护源站</text><rect x="360" y="216" width="230" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/><text x="475.0" y="239.0" font-size="14" text-anchor="middle" fill="#633806" font-weight="600">命中判定</text><text x="475.0" y="259.0" font-size="12" text-anchor="middle" fill="#854F0B">命中即返回,miss 回源</text><line x1="340" y1="310" x2="340" y2="356" stroke="#73726c" stroke-width="1.2"  marker-end="url(#aG)"/><text x="355" y="337" font-size="12">缓存未命中,逐级回源</text><rect x="60" y="360" width="560" height="100" rx="12" fill="#FBEAF0" stroke="#993556" stroke-width="1"/><text x="340" y="395" font-size="14" text-anchor="middle" fill="#72243E" font-weight="600">源站:对象存储(S3 / R2 / GCS)</text><text x="340" y="418" font-size="12" text-anchor="middle" fill="#993556">对外是 HTTP API,按 key 读写,权威数据所在地</text><text x="340" y="438" font-size="12" text-anchor="middle" fill="#993556">对内由分布式文件系统实现 ↓</text><line x1="340" y1="460" x2="340" y2="516" stroke="#73726c" stroke-width="1.2"  marker-end="url(#aG)"/><text x="355" y="492" font-size="12">内部实现(GCS 底层即 Colossus)</text><rect x="60" y="520" width="560" height="270" rx="16" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/><text x="80" y="550" font-size="14" fill="#085041" font-weight="600">GFS 式分布式文件系统 — 解决容量与持久性</text><rect x="230" y="565" width="220" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/><text x="340.0" y="588.0" font-size="14" text-anchor="middle" fill="#3C3489" font-weight="600">Master 节点</text><text x="340.0" y="608.0" font-size="12" text-anchor="middle" fill="#534AB7">只存命名空间和 chunk 位置</text><line x1="340" y1="621" x2="165" y2="658" stroke="#9c9a92" stroke-width="0.9" stroke-dasharray="4 3"/><line x1="340" y1="621" x2="340" y2="658" stroke="#9c9a92" stroke-width="0.9" stroke-dasharray="4 3"/><line x1="340" y1="621" x2="515" y2="658" stroke="#9c9a92" stroke-width="0.9" stroke-dasharray="4 3"/><rect x="90" y="660" width="150" height="115" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/><text x="165" y="690" font-size="14" text-anchor="middle" fill="#444441" font-weight="600">Chunkserver 1</text><text x="165" y="710" font-size="12" text-anchor="middle" fill="#5F5E5A">64MB chunk 分块</text><rect x="112" y="725" width="34" height="18" rx="3" fill="#7F77DD" stroke="#534AB7" stroke-width="0.8"/><rect x="154" y="725" width="34" height="18" rx="3" fill="#5DCAA5" stroke="#0F6E56" stroke-width="0.8"/><rect x="265" y="660" width="150" height="115" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/><text x="340" y="690" font-size="14" text-anchor="middle" fill="#444441" font-weight="600">Chunkserver 2</text><text x="340" y="710" font-size="12" text-anchor="middle" fill="#5F5E5A">64MB chunk 分块</text><rect x="287" y="725" width="34" height="18" rx="3" fill="#7F77DD" stroke="#534AB7" stroke-width="0.8"/><rect x="329" y="725" width="34" height="18" rx="3" fill="#F0997B" stroke="#993C1D" stroke-width="0.8"/><rect x="440" y="660" width="150" height="115" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/><text x="515" y="690" font-size="14" text-anchor="middle" fill="#444441" font-weight="600">Chunkserver 3</text><text x="515" y="710" font-size="12" text-anchor="middle" fill="#5F5E5A">64MB chunk 分块</text><rect x="462" y="725" width="34" height="18" rx="3" fill="#7F77DD" stroke="#534AB7" stroke-width="0.8"/><rect x="504" y="725" width="34" height="18" rx="3" fill="#5DCAA5" stroke="#0F6E56" stroke-width="0.8"/><rect x="546" y="725" width="34" height="18" rx="3" fill="#F0997B" stroke="#993C1D" stroke-width="0.8"/><text x="340" y="822" font-size="12" text-anchor="middle">同色小块 = 同一个 chunk 的多副本,分散在不同机器</text><text x="340" y="844" font-size="12" text-anchor="middle">虚线 = 控制流(心跳、租约);数据流客户端直连 Chunkserver,不过 Master</text></svg>