<svg xmlns="http://www.w3.org/2000/svg" width="680" height="470" viewBox="0 0 680 470"><rect x="0" y="0" width="680" height="470" fill="#ffffff"/><defs><marker id="aG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker><marker id="aT" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker><marker id="aP" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><style>text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",sans-serif}.t{font-size:14px;fill:#3d3d3a}.ts{font-size:12px;fill:#73726c}.th{font-size:14px;font-weight:600;fill:#3d3d3a}</style><text x="60" y="57" font-size="14" font-weight="600">Map 阶段</text><text x="60" y="76" font-size="12">每个 mapper 读一块 HDFS 文件,发出 (city, 1)</text><rect x="60" y="95" width="160" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/><text x="140.0" y="118.0" font-size="14" text-anchor="middle" fill="#3C3489" font-weight="600">Mapper 1</text><text x="140.0" y="138.0" font-size="12" text-anchor="middle" fill="#534AB7">(北京,1) (上海,1)</text><rect x="260" y="95" width="160" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/><text x="340.0" y="118.0" font-size="14" text-anchor="middle" fill="#3C3489" font-weight="600">Mapper 2</text><text x="340.0" y="138.0" font-size="12" text-anchor="middle" fill="#534AB7">(北京,1) (北京,1)</text><rect x="460" y="95" width="160" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/><text x="540.0" y="118.0" font-size="14" text-anchor="middle" fill="#3C3489" font-weight="600">Mapper 3</text><text x="540.0" y="138.0" font-size="12" text-anchor="middle" fill="#534AB7">(上海,1) (上海,1)</text><line x1="140" y1="151" x2="230" y2="280" stroke="#7F77DD" stroke-width="2" opacity="0.8" stroke-linecap="round"/><line x1="140" y1="151" x2="450" y2="280" stroke="#1D9E75" stroke-width="1.2" opacity="0.45" stroke-linecap="round"/><line x1="340" y1="151" x2="230" y2="280" stroke="#7F77DD" stroke-width="2.6" opacity="0.8" stroke-linecap="round"/><line x1="540" y1="151" x2="450" y2="280" stroke="#1D9E75" stroke-width="2.6" opacity="0.8" stroke-linecap="round"/><text x="60" y="227" font-size="14" font-weight="600">Shuffle</text><text x="60" y="246" font-size="12">相同 key 跨网络汇聚到同一个 reducer</text><rect x="150" y="284" width="160" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/><text x="230.0" y="307.0" font-size="14" text-anchor="middle" fill="#3C3489" font-weight="600">Reducer A</text><text x="230.0" y="327.0" font-size="12" text-anchor="middle" fill="#534AB7">收到 北京 × 3</text><rect x="370" y="284" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/><text x="450.0" y="307.0" font-size="14" text-anchor="middle" fill="#085041" font-weight="600">Reducer B</text><text x="450.0" y="327.0" font-size="12" text-anchor="middle" fill="#0F6E56">收到 上海 × 3</text><line x1="230" y1="340" x2="230" y2="374" stroke="#73726c" stroke-width="1.2"  marker-end="url(#aG)"/><line x1="450" y1="340" x2="450" y2="374" stroke="#73726c" stroke-width="1.2"  marker-end="url(#aG)"/><rect x="150" y="378" width="160" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/><text x="230.0" y="405.0" font-size="14" text-anchor="middle" fill="#3C3489" font-weight="600">北京, 3</text><rect x="370" y="378" width="160" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/><text x="450.0" y="405.0" font-size="14" text-anchor="middle" fill="#085041" font-weight="600">上海, 3</text><text x="340" y="452" font-size="12" text-anchor="middle">连线颜色 = key 的去向,粗细 = 数据量</text></svg>